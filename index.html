<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;}
  :root{ --sea:#aecbd6; --land:#e8dcc0; --land2:#dccead; --ink:#3a3226; --line:#b8a883;
         --pin:#c0392b; --panel:#fff8ec; }
  html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#aecbd6;}
  body{display:flex;flex-direction:column;height:100%;
    padding-top:env(safe-area-inset-top);}
  header{padding:10px 16px 8px;background:#fff8ec;border-bottom:1px solid #e0d4b8;z-index:5;}
  .titlerow{display:flex;align-items:baseline;gap:8px;}
  h1{font-family:'Gowun Batang',serif;font-size:21px;font-weight:700;color:#3a3226;}
  h1 .en{font-size:9px;letter-spacing:0.3em;color:#a89878;font-family:'Noto Sans KR';text-transform:uppercase;}
  #tabs{display:flex;gap:6px;margin-top:9px;}
  .tab{flex:1;text-align:center;font-size:13px;font-weight:500;color:#9a8a68;
    padding:8px 0;border-radius:9px;border:1px solid #e0d4b8;background:#fdfaf2;cursor:pointer;}
  .tab.active{background:#3a3226;color:#fff8ec;border-color:#3a3226;font-weight:700;}

  #mapWrap{flex:1;position:relative;overflow:hidden;background:var(--sea);touch-action:none;}
  #mapCanvas{position:absolute;left:0;top:0;}

  #hintBar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:4;
    background:rgba(58,50,38,0.82);color:#fff8ec;font-size:12px;padding:6px 14px;border-radius:20px;
    white-space:nowrap;pointer-events:none;transition:opacity .4s;}

  #zoomBtns{position:absolute;right:12px;bottom:16px;z-index:4;display:flex;flex-direction:column;gap:8px;}
  .zbtn{width:42px;height:42px;border-radius:11px;background:#fff8ec;border:1px solid #d8c8a0;
    font-size:22px;color:#3a3226;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.15);
    display:flex;align-items:center;justify-content:center;}
  .zbtn:active{transform:translateY(1px);}

  /* 정보 패널 */
  #panel{position:absolute;left:0;right:0;bottom:0;z-index:6;background:var(--panel);
    border-top-left-radius:20px;border-top-right-radius:20px;box-shadow:0 -6px 24px rgba(0,0,0,0.2);
    transform:translateY(110%);transition:transform .32s cubic-bezier(.3,.8,.4,1);
    max-height:62%;overflow-y:auto;padding:18px 20px calc(22px + env(safe-area-inset-bottom));}
  #panel.show{transform:translateY(0);}
  #panel .ph{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  #pName{font-family:'Gowun Batang',serif;font-size:23px;font-weight:700;color:#2a2418;}
  #pNow{font-size:12px;color:#9a8a68;white-space:nowrap;}
  #pClose{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:50%;
    border:none;background:#ece0c8;color:#6a5d44;font-size:17px;cursor:pointer;}
  #pMeaning{font-size:13px;color:#8a7a58;margin-top:3px;font-style:italic;}
  #pEvents{margin-top:14px;display:flex;flex-direction:column;gap:11px;}
  .evt{border-left:3px solid #d8b048;padding:2px 0 2px 11px;}
  .evt .t{font-size:14px;font-weight:600;color:#3a3226;line-height:1.4;}
  .evt .v{font-size:12px;color:#a08a60;margin-top:2px;}
  .empty{font-size:13px;color:#a89878;margin-top:12px;}
</style>
</head>

  <div id="zoomBtns">

  {nm:'이탈리아', lat:42.0,lng:13.5},
];

// ── 좌표 변환 (단순 메르카토르) ──
const VIEW={x:0,y:0,scale:1};   // 팬/줌 상태
let W,H,DPR;
const mapCv=$('#mapCanvas'), ctx=mapCv.getContext('2d');
// 투영 기준 범위
const LON0=10, LON1=50, LAT0=26, LAT1=43;
function project(lat,lng){
  // 경도 → x (0~1), 위도 → y (메르카토르)
  const x=(lng-LON0)/(LON1-LON0);
  const merc=l=>Math.log(Math.tan(Math.PI/4 + l*Math.PI/360));
  const y=(merc(LAT1)-merc(lat))/(merc(LAT1)-merc(LAT0));
  return {x,y};
}
// 기본 화면맞춤 배율
let baseW, baseH, offX=0, offY=0;
function computeBase(){
  // 투영 가로:세로 실제 비율 반영
  const merc=l=>Math.log(Math.tan(Math.PI/4 + l*Math.PI/360));
  const lonSpan=LON1-LON0;                        // 경도 폭(도)
  const latSpan=(merc(LAT1)-merc(LAT0))*180/Math.PI; // 메르카토르 위도 폭 환산
  baseW=W;
  baseH=W*(latSpan/lonSpan);
  offX=0; offY=(H-baseH)/2;
}
function toScreen(p){
  return {
    x:(p.x*baseW)*VIEW.scale + VIEW.x + offX,
    y:(p.y*baseH)*VIEW.scale + VIEW.y + offY
  };
}
// 초기: 가나안(예루살렘)을 화면 중앙에 두고 적당히 확대
let initialized=false;
function setInitialView(){
  VIEW.scale=2.4;
  const jeru=project(31.78,35.23);
  // 예루살렘이 화면 중앙 오게 VIEW.x,y 계산
  VIEW.x = W/2 - (jeru.x*baseW)*VIEW.scale - offX;
  VIEW.y = H*0.45 - (jeru.y*baseH)*VIEW.scale - offY;
}

let curEra='구약';

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,3);
  const wrap=$('#mapWrap');
  W=wrap.clientWidth; H=wrap.clientHeight;
  mapCv.width=W*DPR; mapCv.height=H*DPR;
  mapCv.style.width=W+'px'; mapCv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  computeBase();
  if(!initialized){ setInitialView(); initialized=true; }
  draw();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // 바다 배경
  ctx.fillStyle='#aecbd6'; ctx.fillRect(0,0,W,H);

  // 땅 덩어리 (단순 폴리곤들) — 가나안 중심 대략적 해안선
  drawLand();
  drawRivers();

  // 현재 국가 이름 (옅게)
  ctx.fillStyle='rgba(150,135,100,0.45)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const C of COUNTRIES){
    const s=toScreen(project(C.lat,C.lng));
    if(s.x<-60||s.x>W+60||s.y<-30||s.y>H+30) continue;
    ctx.font='700 '+Math.max(11,13*Math.min(VIEW.scale,1.6))+'px "Noto Sans KR"';
    ctx.fillText(C.nm, s.x, s.y);
  }

  // 라벨(바다/강)
  ctx.fillStyle='rgba(70,100,120,0.7)';
  ctx.font='italic '+13+'px "Gowun Batang", serif';
  ctx.textAlign='center';
  for(const L of LABELS){
    const s=toScreen(project(L.lat,L.lng));
    if(s.x<-50||s.x>W+50||s.y<-30||s.y>H+30) continue;
    ctx.fillText(L.nm, s.x, s.y);
  }

  // 핀
  const list=PLACES.filter(p=>p.era.includes(curEra));
  for(const p of list){
    const s=toScreen(project(p.lat,p.lng));
    if(s.x<-30||s.x>W+30||s.y<-30||s.y>H+30) continue;
    drawPin(s.x,s.y,p.nm);
  }
}

function drawLand(){
  ctx.fillStyle='#e8dcc0'; ctx.strokeStyle='#cbbd97'; ctx.lineWidth=1.5;
  // 1) 비옥한 초승달 + 아라비아 (레반트~메소포타미아~아라비아)
  const mainland=[
    [43,36],[42,40],[41,43],[39.7,44.3],
    [38.5,46.5],[36,48],[33,49],[31,49],[30,48.5],
    [29.5,47],[29,45],[27.5,44],[26,42],[26,38],[26,35],
    [27.5,34.3],[29,34.2],[30,34.3],[31,34],[31.5,34.2],
    [32.5,34.7],[33.3,35.1],[34,35.5],[35.5,35.6],
    [36.2,36.0],[36.6,35.5],[37,35.8],[38.5,36],[40,36],[43,36]
  ];
  fillGeo(mainland);
  // 2) 소아시아(터키) 본토
  const anatolia=[
    [41.5,26],[42,30],[42,36],[41,40],[40,36],[39,33],[38.5,30],
    [38.5,27],[39.5,26],[41,26]
  ];
  fillGeo(anatolia);
  // 3) 그리스 + 마게도냐 (발칸 남부)
  const greece=[
    [42,20],[41.5,24],[41,26],[39.5,26],[38,23.7],[37.9,22.9],
    [37,22],[38,21],[39,20.2],[40.5,19.5],[42,20]
  ];
  fillGeo(greece);
  // 4) 이탈리아 (장화 단순화)
  const italy=[
    [42.5,11],[42,13.5],[41.9,12.5],[40,17],[39,18],[40,16],[41.5,14],
    [43,12],[42.5,11]
  ];
  fillGeo(italy);
  // 5) 이집트(나일 서편)
  const egypt=[[31,31.5],[31,28],[27,28],[26,32],[29.5,33],[31,31.5]];
  fillGeo(egypt);
  // 섬들
  fillGeo([[35.7,14.0],[35.9,14.6],[36.1,14.5],[35.9,14.0]]); // 멜리데(몰타)
  fillGeo([[35.7,32.3],[35.2,34.0],[34.6,33.0],[35.0,32.4]]); // 구브로(키프로스)
  fillGeo([[35.6,23.5],[35.2,26.2],[35.5,24.5]]); // 크레타
}
function fillGeo(coords){
  ctx.beginPath();
  coords.forEach((c,i)=>{ const s=toScreen(project(c[0],c[1]));
    if(i===0)ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y); });
  ctx.closePath(); ctx.fill(); ctx.stroke();
}
function drawRivers(){
  ctx.strokeStyle='#7fa8bd'; ctx.lineWidth=2.2; ctx.lineCap='round';
  // 요단강 (갈릴리→사해)
  pathGeo([[32.83,35.59],[32.4,35.55],[32.0,35.55],[31.5,35.47]]);
  // 유브라데강
  pathGeo([[38.5,39.5],[36.5,40],[35,40.5],[33.5,42],[32,44.5],[31,46]]);
  // 티그리스강
  pathGeo([[37.5,42.5],[36,43.2],[34.5,44.5],[33,45],[31.2,47]]);
  // 나일강
  pathGeo([[31,31.2],[29,31],[27.5,33]]);
}
function pathGeo(coords){
  ctx.beginPath();
  coords.forEach((c,i)=>{ const s=toScreen(project(c[0],c[1]));
    if(i===0)ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y); });
  ctx.stroke();
}

function drawPin(x,y,name){
  // 핀
  ctx.save();
  ctx.fillStyle='#c0392b'; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(x,y-8,6,Math.PI,0); // 위 반원
  ctx.lineTo(x,y+2); ctx.closePath();
  ctx.moveTo(x+6,y-8);
  ctx.arc(x,y-8,6,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y-8,2.3,0,7); ctx.fill();
  // 이름표
  ctx.font='600 12.5px "Noto Sans KR"';
  const tw=ctx.measureText(name).width;
  ctx.fillStyle='rgba(255,248,236,0.92)';
  roundR(ctx, x-tw/2-5, y+3, tw+10, 17, 5); ctx.fill();
  ctx.fillStyle='#2a2418'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(name, x, y+12);
  ctx.restore();
}
function roundR(ctx,x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }

// ── 인터랙션: 팬 + 핀치줌 + 탭 ──
let pointers=new Map(), lastDist=0, lastMid=null, moved=false, downPt=null;
const wrap=$('#mapWrap');
wrap.addEventListener('pointerdown',e=>{
  wrap.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  moved=false; downPt={x:e.clientX,y:e.clientY};
  if(pointers.size===2){ const pts=[...pointers.values()];
    lastDist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    lastMid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2}; }
});
wrap.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev=pointers.get(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){
    const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
    if(Math.abs(e.clientX-downPt.x)+Math.abs(e.clientY-downPt.y)>6) moved=true;
    VIEW.x+=dx; VIEW.y+=dy; draw();
  } else if(pointers.size===2){
    const pts=[...pointers.values()];
    const dist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
    if(lastDist){
      const factor=dist/lastDist;
      zoomAt(mid.x,mid.y,factor);
    }
    lastDist=dist; lastMid=mid; moved=true;
  }
});
wrap.addEventListener('pointerup',e=>{
  const wasTap=!moved;
  pointers.delete(e.pointerId); lastDist=0;
  if(wasTap && pointers.size===0){ handleTap(e.clientX,e.clientY); }
});
wrap.addEventListener('pointercancel',e=>{ pointers.delete(e.pointerId); lastDist=0; });

function zoomAt(cx,cy,factor){
  const rect=mapCv.getBoundingClientRect();
  const mx=cx-rect.left, my=cy-rect.top;
  const ns=Math.max(0.6,Math.min(VIEW.scale*factor,9));
  const real=ns/VIEW.scale;
  VIEW.x = mx - (mx-VIEW.x)*real;
  VIEW.y = my - (my-VIEW.y)*real;
  VIEW.scale=ns; draw();
}
$('#zin').addEventListener('click',()=>zoomAt(W/2,H/2,1.4));
$('#zout').addEventListener('click',()=>zoomAt(W/2,H/2,1/1.4));

function handleTap(cx,cy){
  const rect=mapCv.getBoundingClientRect();
  const mx=cx-rect.left, my=cy-rect.top;
  const list=PLACES.filter(p=>p.era.includes(curEra));
  let best=null,bd=1e9;
  for(const p of list){
    const s=toScreen(project(p.lat,p.lng));
    const d=Math.hypot(s.x-mx,s.y-my);
    if(d<bd){bd=d;best=p;}
  }
  if(best && bd<26){ openPanel(best); }
  else { closePanel(); }
}

// 구절 책이름 → 시대 판별
const BOOK_OT=['창','출','레','민','신','수','삿','룻','삼상','삼하','왕상','왕하','대상','대하','스','느','에','욥','시','잠','전','아','사','렘','애','겔','단','호','욜','암','옵','욘','미','나','합','습','학','슥','말'];
const BOOK_GOSPEL=['마','막','눅','요'];
function eventEra(v){
  const b=v.replace(/\s.*/,'').replace(/[0-9:~장,].*/,'');
  if(BOOK_GOSPEL.includes(b)) return '예수님';   // 복음서는 예수님 시대로 우선
  if(BOOK_OT.includes(b)) return '구약';
  return '신약';                                  // 행~계
}

function openPanel(p){
  $('#pName').textContent=p.nm;
  $('#pNow').textContent=p.now?('지금: '+p.now):'';
  $('#pMeaning').textContent=p.mean?('이름 뜻 · '+p.mean):'';
  const ev=$('#pEvents'); ev.innerHTML='';
  // 현재 탭에 맞는 사건만 (예수님 탭은 복음서, 구약 탭은 구약책, 신약 탭은 행~계)
  let evs=(p.ev||[]).filter(e=>eventEra(e.v)===curEra);
  // 해당 시대 사건이 없으면, 그 지명 전체 사건을 보여주되 시대 라벨을 붙임
  const showAll = evs.length===0;
  const target = showAll ? (p.ev||[]) : evs;
  if(target.length){
    for(const e of target){
      const d=document.createElement('div'); d.className='evt';
      const eraTag = showAll ? '<span style="font-size:11px;color:#b0a080;">['+eventEra(e.v)+'] </span>' : '';
      d.innerHTML='<div class="t">'+eraTag+e.t+'</div><div class="v">'+e.v+'</div>';
      ev.appendChild(d);
    }
  } else { ev.innerHTML='<div class="empty">기록된 사건이 아직 없어요.</div>'; }
  $('#panel').classList.add('show');
}
function closePanel(){ $('#panel').classList.remove('show'); }
$('#pClose').addEventListener('click',closePanel);

// 탭
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); curEra=t.dataset.era; closePanel(); draw();
  });
});

// 힌트바 자동 숨김
setTimeout(()=>{ const h=$('#hintBar'); if(h) h.style.opacity='0'; },4200);

window.addEventListener('resize',resize);
resize();
</script>
